<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daylio Filter</title>

    <!-- PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #2b2b2b;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, button {
            width: 100%;
            margin-top: 5px;
            padding: 8px;
            border-radius: 6px;
            border: none;
        }

        input {
            background: #3a3a3a;
            color: white;
        }

        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #2563eb;
        }

        #status {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Daylio Filter</h1>

    <label>CSV File:</label>
    <input type="file" id="fileInput" accept=".csv">

    <label>Start Date:</label>
    <input type="date" id="startDate">

    <label>End Date:</label>
    <input type="date" id="endDate">

    <button onclick="processFile()">Process</button>

    <div id="status"></div>
</div>

<script>
function processFile() {
    const fileInput = document.getElementById("fileInput");
    const startDateInput = document.getElementById("startDate").value;
    const endDateInput = document.getElementById("endDate").value;
    const status = document.getElementById("status");

    if (!fileInput.files.length) {
        status.innerText = "Please select a CSV file.";
        return;
    }

    const file = fileInput.files[0];
    const start = startDateInput ? new Date(startDateInput) : null;
    const end = endDateInput ? new Date(endDateInput) : new Date();

    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            try {
                const data = results.data;

                const filtered = data
                    .map(row => {
                        const [day, month, year] = row.full_date.split("-");
                        const date = new Date(year, month - 1, day);

                        return {
                            date: date,
                            note: (row.note || "").replaceAll("<br>", "\n")
                        };
                    })
                    .filter(item => {
                        if (!start) return item.date <= end;
                        return item.date >= start && item.date <= end;
                    });

                downloadCSV(filtered);
                status.innerText = "Done ✅";

            } catch (e) {
                status.innerText = "Error: " + e;
            }
        }
    });
}

function downloadCSV(data) {
    const rows = data.map(n =>
        `${n.date.toISOString().slice(0,10)}|${n.note.replace(/\n/g, " ")}`
    );

    const content = "date|note\n" + rows.join("\n");

    const blob = new Blob([content], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "filtered.csv";
    a.click();
}
</script>

</body>
</html>
